site_name: Node-RED教程库
site_description: Official documentation for ARMxy industrial edge gateways

# 主题：material 工业文档美观主题，外网展示效果好
theme:
  name: material
  custom_dir: overrides
  language: zh
  logo: assets/图片材料/钡铼技术.png
  favicon: assets/图片材料/钡铼技术.png
  palette:
    # 亮色模式下代码块自动深色
    - scheme: default
      primary: black
      accent: blue

# 导航栏目录，和你仓库 docs 下文件一一对应
nav:
  - 首页: index.md
  - Node-RED:
      - 第1篇 ARMxy 部署 Node-RED 入门: node-red/第1篇：快速装好Node-RED，在ARMxy上跑通你的第一个节点.md
      - 第2篇 基础节点使用: node-red/第2篇：Node-RED基础节点全掌握实战教程（Inject、Debug、Switch、Function）.md
      - 第3篇 常用功能与社区节点: node-red/第3篇：Node-RED常用功能节点盘点及社区节点安装.md
      - 第4篇 采集西门子 S7-200 SMART: node-red/第4篇：基于ARMxy内置Node-red平台采集西门子S7-200 SMART PLC数据实操.md
      - 第5篇 Modbus RTU 采集实战: node-red/第5篇：基于ARMxy内置Node-RED平台的Modbus RTU数据采集实战.md
      - 第6篇Modbus RTU+MQTT 上云: node-red/第6篇：Node-RED Modbus RTU数据采集及MQTT云端上传演示.md
      - 第7篇 自定义 TCP 通信: node-red/第7篇：基于 Node-RED 的自定义TCP协议通信实现.md
      - 第8篇 双数据库存储实现: node-red/第8篇：Node-RED 双数据库存储实现.md
      - 第9篇 Dashboard 可视化数据看板实现: node-red/第9篇：Node-RED Dashboard 可视化数据看板实现.md
      - 第10篇 风速联动风扇控制: node-red/第10篇：Node-RED 本地离线风速联动风扇控制.md
      - 第11篇 Exec 节点使用教程: node-red/第11篇：Node-RED Exec节点使用教程.md
      - 第12篇 OPC UA 采集 + MQTT 上报华为云: node-red/第12篇：Node-RED实现OPC UA数据采集与MQTT上报华为云.md

extra_css:
  - assets/custom.css

extra_javascript:
  - assets/translate.js
  - https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit
